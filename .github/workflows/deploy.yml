name: Deploy

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/theredhotmoon/bandms/backend
  FRONTEND_IMAGE: ghcr.io/theredhotmoon/bandms/frontend

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t bandms-test ./api

      - name: Run tests
        run: |
          docker run --rm \
            -e APP_ENV=testing \
            bandms-test

  build-and-push:
    name: Build & push images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          target: app
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app
          target: app
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose and Caddy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/caddy/Caddyfile"
          target: /opt/bandms/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            cd /opt/bandms

            # Authenticate and pull new images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Rolling restart: backend first (runs migrations via entrypoint),
            # wait for healthcheck, then update frontend and caddy
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait backend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps caddy

            docker image prune -f

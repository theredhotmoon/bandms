services:
  app:
    image: '${DOCKER_IMAGE:-bandms-service/app}:${APP_VERSION:-latest}'
    container_name: bandms-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    environment:
      APP_NAME: "${APP_NAME}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bandms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: 'mysql:8.4'
    container_name: bandms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'bandms-mysql-data:/var/lib/mysql'
    networks:
      - bandms
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      timeout: 5s
      interval: 10s
      start_period: 30s

networks:
  bandms:
    driver: bridge

volumes:
  bandms-mysql-data:
    driver: local

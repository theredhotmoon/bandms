services:
  caddy:
    image: caddy:2-alpine
    container_name: bandms-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - bandms
    depends_on:
      - frontend

  frontend:
    image: ghcr.io/theredhotmoon/bandms/frontend:${APP_VERSION:-latest}
    container_name: bandms-frontend
    restart: unless-stopped
    networks:
      - bandms

  backend:
    image: ghcr.io/theredhotmoon/bandms/backend:${APP_VERSION:-latest}
    container_name: bandms-backend
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-BandMS}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
      FACEBOOK_APP_ID: "${FACEBOOK_APP_ID:-}"
      FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET:-}"
      SETLISTFM_API_KEY: "${SETLISTFM_API_KEY:-}"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - bandms-storage:/var/www/html/storage/app/public
    networks:
      - bandms
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.4
    container_name: bandms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - bandms-mysql:/var/lib/mysql
    networks:
      - bandms
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      timeout: 5s
      interval: 10s
      start_period: 30s

networks:
  bandms:
    driver: bridge

volumes:
  bandms-mysql:
  bandms-storage:
  caddy-data:
  caddy-config:

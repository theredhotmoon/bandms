server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers (path only) so trailing-slash redirects
    # preserve whatever host:port the browser is on (e.g. localhost:4322 in dev).
    # Without this, Nginx builds "http://$host/concerts/" using only $host
    # (no port), sending the browser to port 80 instead of the mapped port.
    absolute_redirect off;

    # ── Static assets — long-lived cache ─────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Token-based routes — serve shell page, island reads token from URL ───
    location ^~ /newsletter/confirm/ {
        try_files $uri $uri/ /newsletter/confirm/index.html;
    }
    location ^~ /newsletter/unsubscribe/ {
        try_files $uri $uri/ /newsletter/unsubscribe/index.html;
    }
    location ^~ /rider/ {
        try_files $uri $uri/ /rider/index.html;
    }

    # ── API proxy → backend container ────────────────────────────────────────
    location /api/ {
        proxy_pass             http://backend/api/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        client_max_body_size   10M;
    }

    # ── Storage (uploaded media) → backend container ─────────────────────────
    location ^~ /storage/ {
        proxy_pass         http://backend/storage/;
        proxy_set_header   Host              $host;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── Everything else: static files ─────────────────────────────────────────
    # IMPORTANT: use $uri/index.html NOT $uri/ — the latter triggers a 301
    # trailing-slash redirect that browsers cache as permanent. Direct lookup
    # serves concerts/index.html for both /concerts and /concerts/ without
    # any redirect. See CLAUDE.md "Known footguns" for full explanation.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
